name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  format-lint:
    name: Formatage & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Vérifier le formatage (Prettier)
        run: npm run format:check

      - name: Analyser le code (ESLint + SonarJS)
        run: npm run lint

  tests:
    name: Tests unitaires
    runs-on: ubuntu-latest
    needs: [format-lint]
    env:
      DATABASE_URL: file:./prisma/dev.db

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Générer le client Prisma
        run: npx prisma generate

      - name: Lancer les tests avec couverture
        run: npm run test:ci

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [tests]
    env:
      DATABASE_URL: file:./prisma/dev.db

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Générer le client Prisma
        run: npx prisma generate

      - name: Compiler l'application
        run: npm run build

  security:
    name: Scan de sécurité (Trivy)
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Installer Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scanner les dépendances npm
        run: trivy fs --exit-code 0 --severity CRITICAL,HIGH --no-progress .
